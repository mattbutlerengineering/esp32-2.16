name: bridge

on:
  push:
    paths:
      - "bridge/**"
      - ".github/workflows/bridge.yml"
  pull_request:
    paths:
      - "bridge/**"
      - ".github/workflows/bridge.yml"

jobs:
  test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: bridge
    steps:
      - uses: actions/checkout@v4
      - name: Install uv
        uses: astral-sh/setup-uv@v5
      - name: Create venv and install deps
        run: |
          uv venv --python 3.11
          uv pip install -e ".[dev]"
      - name: Run tests
        run: uv run pytest -q
