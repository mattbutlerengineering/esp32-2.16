name: bridge

on:
  push:
    paths:
      - "bridge/**"
      - ".github/workflows/bridge.yml"
  pull_request:
    paths:
      - "bridge/**"
      - ".github/workflows/bridge.yml"

jobs:
  test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: bridge
    steps:
      - uses: actions/checkout@v4
      - name: Install uv
        uses: astral-sh/setup-uv@v5
      - name: Set up Python
        run: uv python install 3.11
      - name: Install deps
        run: uv pip install --system -e ".[dev]"
      - name: Run tests
        run: pytest -q
